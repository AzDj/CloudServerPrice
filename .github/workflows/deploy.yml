name: 部署 GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: 构建并发布静态页面
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 配置 Pages
        uses: actions/configure-pages@v6

      - name: 配置 Vite 资源路径
        shell: bash
        run: echo "VITE_BASE=/" >> "$GITHUB_ENV"

      - name: 构建静态页面
        run: npm run build -- --base "$VITE_BASE"

      - name: 上传 Pages 构件
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
